name: Publish client SDK

# Publishes @jsonbored/metagraphed (packages/client) to npm via OIDC trusted
# publishing — no NPM_TOKEN. Manual trigger; the version is read from
# packages/client/package.json. Requires a one-time npm-side setup (see
# packages/client/PUBLISHING.md): a first bootstrap
# publish, and a Trusted Publisher pointing at this repo + workflow + the
# `npm-production` environment.
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: client-package-release
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 24.16.0
          registry-url: https://registry.npmjs.org

      - name: Validate release version
        run: bash scripts/validate-client-release.sh

      - name: Build + pack dry-run
        working-directory: packages/client
        run: |
          npm install --no-audit --no-fund
          npm run build
          npm pack --dry-run

  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: validate
    environment: npm-production
    permissions:
      contents: write
      id-token: write
    concurrency:
      group: client-package-release
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 24.16.0
          registry-url: https://registry.npmjs.org

      - name: Validate release version
        id: release
        run: bash scripts/validate-client-release.sh

      - name: Build
        working-directory: packages/client
        run: |
          npm install --no-audit --no-fund
          npm run build

      - name: Publish to npm (OIDC trusted publishing)
        working-directory: packages/client
        env:
          NPM_CONFIG_PROVENANCE: "true"
        run: npm publish --access public --provenance --ignore-scripts

      - name: Tag + GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$RELEASE_TAG" -m "@jsonbored/metagraphed v$RELEASE_VERSION"
          git remote set-url origin "https://github.com/${GITHUB_REPOSITORY}.git"
          gh auth setup-git
          git push origin "$RELEASE_TAG"
          gh release create "$RELEASE_TAG" \
            --title "@jsonbored/metagraphed v$RELEASE_VERSION" \
            --notes "Published \`@jsonbored/metagraphed@$RELEASE_VERSION\` to npm with provenance via OIDC trusted publishing. https://www.npmjs.com/package/@jsonbored/metagraphed/v/$RELEASE_VERSION"
